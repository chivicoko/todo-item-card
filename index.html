<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stage 0 Todo Card</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: rgba(15, 23, 42, 0.78);
      --border: rgba(255,255,255,0.12);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
      --chip: rgba(255,255,255,0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(56,189,248,0.18), transparent 35%),
        radial-gradient(circle at bottom left, rgba(34,197,94,0.14), transparent 30%),
        var(--bg);
      color: var(--text);
    }

    .todo-card {
      width: min(100%, 480px);
      /* max-width: 500px; */
      background: var(--card);
      border: 1px solid var(--border);
      backdrop-filter: blur(14px);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      overflow: hidden;
    }

    .top-row,
    .meta-row,
    .footer-row {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .checkbox-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      min-width: 0;
    }

    input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: var(--success);
      cursor: pointer;
      flex-shrink: 0;
    }

    h2 {
      margin: 0;
      font-size: clamp(1.1rem, 2vw, 1.35rem);
      line-height: 1.4;
      word-break: break-word;
    }

    .completed h2 {
      text-decoration: line-through;
      color: var(--muted);
    }

    p {
      margin: 16px 0;
      color: #cbd5e1;
      line-height: 1.65;
      font-size: 0.96rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.08);
      white-space: nowrap;
    }

    .priority-high {
      background: rgba(239, 68, 68, 0.14);
      color: #fecaca;
    }

    .status-pill {
      background: rgba(56, 189, 248, 0.14);
      color: #bae6fd;
    }

    .time-group {
      margin-top: 18px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
    }

    time {
      display: block;
      font-size: 0.92rem;
    }

    .due-date {
      color: var(--text);
      font-weight: 600;
    }

    .remaining {
      margin-top: 8px;
      color: var(--accent);
      font-weight: 700;
    }

    .tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      list-style: none;
      padding: 0;
      margin: 18px 0 0;
    }

    .tag {
      background: var(--chip);
      color: #dbeafe;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .actions {
      margin-top: 22px;
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:focus-visible,
    input:focus-visible {
      outline: 3px solid rgba(56, 189, 248, 0.6);
      outline-offset: 3px;
    }

    .edit-btn {
      background: rgba(56, 189, 248, 0.16);
      color: #e0f2fe;
    }

    .delete-btn {
      background: rgba(239, 68, 68, 0.16);
      color: #fee2e2;
    }

    @media (max-width: 480px) {
      .todo-card { padding: 18px; border-radius: 20px; }
      .actions { justify-content: stretch; }
      .actions button { flex: 1; }
    }
  </style>
</head>
<body>
  <article class="todo-card" data-testid="test-todo-card" id="todoCard">
    <div class="top-row">
      <div class="checkbox-wrap">
        <input
          type="checkbox"
          id="taskComplete"
          data-testid="test-todo-complete-toggle"
          aria-label="Mark task as complete"
        />
        <h2 data-testid="test-todo-title">Finish analytics dashboard UI polish</h2>
      </div>

      <span
        class="badge priority-high"
        data-testid="test-todo-priority"
        aria-label="High priority"
      >🔴 High</span>
    </div>

    <p data-testid="test-todo-description">
      Refine spacing, improve chart legend responsiveness, validate empty states,
      and prepare the component for QA automation review with stable selectors.
    </p>

    <div class="meta-row">
      <span
        class="badge status-pill"
        data-testid="test-todo-status"
        id="taskStatus"
      >In Progress</span>
    </div>

    <div class="time-group">
      <time
        class="due-date"
        data-testid="test-todo-due-date"
        id="dueDate"
        datetime="2026-04-16T18:00:00.000Z"
      ></time>
      <time
        class="remaining"
        data-testid="test-todo-time-remaining"
        id="timeRemaining"
        aria-live="polite"
      ></time>
    </div>

    <ul class="tags" role="list" data-testid="test-todo-tags">
      <li class="tag" data-testid="test-todo-tag-work">work</li>
      <li class="tag" data-testid="test-todo-tag-urgent">urgent</li>
      <li class="tag" data-testid="test-todo-tag-design">design</li>
    </ul>

    <div class="actions">
      <button
        class="edit-btn"
        type="button"
        data-testid="test-todo-edit-button"
        aria-label="Edit task"
      >Edit</button>

      <button
        class="delete-btn"
        type="button"
        data-testid="test-todo-delete-button"
        aria-label="Delete task"
      >Delete</button>
    </div>
  </article>

  <script>
    const dueDate = new Date('2026-04-16T18:00:00.000Z');
    const dueDateEl = document.getElementById('dueDate');
    const timeRemainingEl = document.getElementById('timeRemaining');
    const checkbox = document.getElementById('taskComplete');
    const statusEl = document.getElementById('taskStatus');
    const card = document.getElementById('todoCard');

    function formatDueDate(date) {
      return `Due ${date.toLocaleString(undefined, {
    //   return `Due ${date.toLocaleDateString(undefined, {
        month: 'short',
        day: 'numeric',
        year: 'numeric',
        hour: 'numeric',
        minute: '2-digit'
      })}`;
    }

    function getTimeRemainingText(target) {
      const diff = target.getTime() - Date.now();
      const abs = Math.abs(diff);
      const mins = Math.floor(abs / 60000);
      const hours = Math.floor(mins / 60);
      const days = Math.floor(hours / 24);

      if (abs < 60000) return 'Due now!';

      if (diff > 0) {
        if (days > 1) return `Due in ${days} days`;
        if (days === 1) return 'Due tomorrow';
        if (hours >= 1) return `Due in ${hours} hour${hours > 1 ? 's' : ''}`;
        return `Due in ${mins} minute${mins !== 1 ? 's' : ''}`;
      }

      if (days >= 1) return `Overdue by ${days} day${days > 1 ? 's' : ''}`;
      if (hours >= 1) return `Overdue by ${hours} hour${hours > 1 ? 's' : ''}`;
      return `Overdue by ${mins} minute${mins !== 1 ? 's' : ''}`;
    }

    function updateTime() {
      dueDateEl.textContent = formatDueDate(dueDate);
      timeRemainingEl.textContent = getTimeRemainingText(dueDate);
    }

    checkbox.addEventListener('change', () => {
      const done = checkbox.checked;
      card.classList.toggle('completed', done);
      statusEl.textContent = done ? 'Done' : 'In Progress';
    });

    document.querySelector('[data-testid="test-todo-edit-button"]').addEventListener('click', () => {
      console.log('Edit button clicked');
      alert('Edit button clicked');
    });

    document.querySelector('[data-testid="test-todo-delete-button"]').addEventListener('click', () => {
        console.log('Delete button clicked');
        alert('Delete button clicked');
    });

    updateTime();
    setInterval(updateTime, 60000);
  </script>
</body>
</html>
